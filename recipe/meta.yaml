{% set name = "envstack" %}
{% set version = "1.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 84a69359112d88f95bc2dfd768daf611706ea603acc40e1a8c1c2dd16deaca33

build:
  noarch: python
  number: 0
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - envstack=envstack.cli:main
    - whichenv="envstack.cli:whichenv"

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - pyyaml >=5.1.2
    - cryptography >=43.0.1

test:
  imports:
    - envstack
  commands:
    - envstack -h
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Stacked environment variable management system
  home: http://github.com/rsgalloway/envstack
  dev_url: http://github.com/rsgalloway/envstack
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fgvieira
    - rsgalloway
